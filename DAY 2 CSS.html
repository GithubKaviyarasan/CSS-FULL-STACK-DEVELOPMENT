<!-- CSS Color Systems - Color Name, RGB, RGBA, HSL, HSLA, HEX, HEXA
1. Color Name - Uses predefined color names directly
2. RGB(RED, GREEN, BLUE) RGB - RGB uses three Values - R - 0 to 255, G - 0 to 255, B - 0 to 255
3. RGBA(RED, GREEN, BLUE)+Alpha - RGBA - adds Alpha (Transparency)
0-Fully Transparent, 1-Fully Visible
4. HSL - H - Hub (0 to 360), S - Saturation L - Lightness - 0% to 100% (Percentage)
5. HSLA - H - Hub (0 to 360), S - Saturation L - Lightness - 0% to 100% (Percentage)
HSLA adds transparency to HSL
6. HEX - HEX uses hexadecimal values - #RRGGBB - 0 to 9, A to F
7. HEXA - HEXA adds transparency to HEX - #RRGGBBAA - 0 to 9, A to F
 
 
-->
 
 
<html>
    <head>
        <title>Day 2 CSS Session</title>
    </head>
 
    <body>

       
        <p style="color: rgb(125, 14, 135);"> RGB</p>
        <p style="background-color: rgb(125, 14, 135);">RGB</p>
 
 
        <p style="color: rgba(125, 14, 135, 0.468);"> RGBA</p>
        <p style="background-color: rgba(125, 14, 135, 0.468);">RGBA</p>
 
        <p style="color: hsl(51, 100%, 50%);">HSL</p>
        <p style="background-color: hsl(51, 100%, 50%);">HSL</p>
 
         <p style="color: hsla(51, 100%, 50%, 0.462);">HSL</p>
        <p style="background-color: hsla(51, 100%, 50%, 0.462);">HSL</p>
 
        <p style="color: #570707;">HEX - #RRGGBB</p>
        <p style="background-color: #570707;">HEX - #RRGGBB</p>
 
         <p style="color: #57070790;">HEXA - #RRGGBBAA</p>
        <p style="background-color: #57070790;">HEXA - #RRGGBBAA</p>
 
       
        <p style="color: orangered;">Welcome to Credo Systemz</p>
        <p style="background-color: orangered;">Welcome to Credo Systemz</p>
    </body>
</html>
