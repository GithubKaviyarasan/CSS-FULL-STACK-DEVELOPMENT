<html>

<head>
    <title>Font - CSS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">


    <style>
        h1 {

            font-family: "Dancing Script", cursive;
            font-size: 40px;

            color: orange;
            text-align: center;
            text-decoration: underline;
            text-decoration-color: black;

        }

        p {
            /* <!--GOOGLE FONTS--> */
            font-family: "Dancing Script", cursive;
            font-optical-sizing: auto;
            font-weight: bold;
            font-style: normal;
            font-size: 30px;

            color: darkblue;
            text-align: center;

            /* <!-- font-families--> */
            /* font-family: cursive;
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif
            font-size: 30px;
            font-weight: bold;
            color: darkblue; */

            /* <!--extra (added) --> */
            /* color: darkblue; */
        }
    </style>

</head>

<body>
    <h1>CSS Font Styling</h1>
    <p>
        Welcome to Credo Systemz <br>
        This is a CSS Font Styling Practice.<br>
        We are learning font-family, font-size and font-weight.
    </p>
</body>

</html>
